esphome:
  name: radar-presencia
  friendly_name: Radar Presencia

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: arduino

logger:
  hardware_uart: USB_SERIAL_JTAG
  baud_rate: 0

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  output_power: 8.5dB

  ap:
    ssid: "Radar-Presencia Fallback Hotspot"
    password: "1S5W4MPS0XPw"

captive_portal:

uart:
  id: ld2420_radar
  tx_pin: GPIO0
  rx_pin: GPIO1
  baud_rate: 115200
  parity: NONE
  stop_bits: 1
  rx_buffer_size: 512

ld2420:
  uart_id: ld2420_radar

text_sensor:
  - platform: ld2420
    fw_version:
      name: LD2420 Firmware

switch:
  - platform: template
    name: "Modo Automático Luces"
    id: modo_auto_luces
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO7
      mode: INPUT_PULLUP
      inverted: true
    name: "Botón Modo Luces"
    on_press:
      then:
        - switch.toggle: modo_auto_luces
    filters:
      - delayed_on: 50ms

  - platform: ld2420
    has_target:
      name: Presence

sensor:
  - platform: ld2420
    moving_distance:
      name: Moving Distance

  - platform: dht
    pin:
      number: GPIO5
    model: DHT11
    temperature:
      name: "Temperatura Habitación"
    humidity:
      name: "Humedad Habitación"
    update_interval: 300s

  - platform: adc
    pin: GPIO3
    name: "Luminosidad Habitación"
    id: luminosidad
    update_interval: 5s
    device_class: illuminance
    state_class: measurement
    attenuation: auto
    filters:
      - lambda: return ((x / 3.3)) * 100.0;
    unit_of_measurement: "%"

select:
  - platform: ld2420
    operating_mode:
      name: Operating Mode

number:
  - platform: ld2420
    presence_timeout:
      name: Detection Presence Timeout
    min_gate_distance:
      name: Detection Gate Minimum
    max_gate_distance:
      name: Detection Gate Maximum
    gate_select:
      name: Select Gate to Set
    still_threshold:
      name: Set Still Threshold Value
    move_threshold:
      name: Set Move Threshold Value

button:
  - platform: ld2420
    apply_config:
      name: Apply Config
    factory_reset:
      name: Factory Reset
    restart_module:
      name: Restart Module
    revert_config:
      name: Undo Edits
